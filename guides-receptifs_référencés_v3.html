<style>
  :root {
    --bg:#0d0f14;--surface:#161920;--card:#1e2230;--border:#2a2f42;
    --accent:#c9a84c;--accent2:#e8c87a;--text:#e8e4dc;--muted:#7a8099;--tag-bg:#252a3a;
    --comet:#5b8fff;--chateau:#8b5cf6;--stade:#ef4444;--paris:#10b981;
    --idf:#f59e0b;--normandie:#06b6d4;--belgique:#ec4899;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

  header{background:linear-gradient(135deg,#0d0f14,#161a26);border-bottom:1px solid var(--border);
    padding:16px 24px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:1000;}
  .logo{font-family:'Playfair Display',serif;font-size:19px;color:var(--accent);white-space:nowrap;}
  .logo span{color:var(--text);font-weight:400;}

  .search-wrap{flex:1;max-width:560px;position:relative;}
  .search-wrap svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
  #searchInput{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:50px;
    padding:11px 18px 11px 44px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;
    transition:border-color .2s,box-shadow .2s;}
  #searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,168,76,.12);}
  #searchInput::placeholder{color:var(--muted);}

  #searchResults{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--card);
    border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.5);
    max-height:360px;overflow-y:auto;display:none;z-index:9999;}
  #searchResults.show{display:block;}
  .sr-item{display:flex;align-items:center;gap:11px;padding:10px 14px;cursor:pointer;
    transition:background .15s;border-bottom:1px solid var(--border);}
  .sr-item:last-child{border-bottom:none;}
  .sr-item:hover{background:var(--tag-bg);}
  .sr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .sr-info{flex:1;min-width:0;}
  .sr-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sr-meta{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sr-arrow{color:var(--accent);font-size:15px;flex-shrink:0;}

  .app{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 65px);}

  .sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:14px 12px;}
  .sidebar::-webkit-scrollbar{width:3px;}
  .sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  .filter-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
  .chip{padding:4px 10px;border-radius:50px;font-size:11px;font-weight:500;cursor:pointer;
    border:1.5px solid transparent;transition:all .2s;background:var(--tag-bg);color:var(--muted);}
  .chip.active,.chip:hover{color:var(--text);border-color:currentColor;}
  .chip[data-cat="all"].active{color:var(--accent);}
  .chip[data-cat="comet"].active{color:var(--comet);}
  .chip[data-cat="chateau"].active{color:var(--chateau);}
  .chip[data-cat="stade"].active{color:var(--stade);}
  .chip[data-cat="paris"].active{color:var(--paris);}
  .chip[data-cat="idf"].active{color:var(--idf);}
  .chip[data-cat="normandie"].active{color:var(--normandie);}
  .chip[data-cat="belgique"].active{color:var(--belgique);}
  .count-badge{display:inline-block;background:var(--border);border-radius:50px;font-size:10px;padding:1px 5px;margin-left:3px;color:var(--muted);}

  .group-label{font-size:10px;font-weight:600;letter-spacing:1.1px;text-transform:uppercase;color:var(--muted);
    padding:10px 4px 6px;display:flex;align-items:center;gap:7px;}
  .group-label::after{content:'';flex:1;height:1px;background:var(--border);}

  .venue-card{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:9px;cursor:pointer;
    transition:all .15s;border:1px solid transparent;margin-bottom:2px;}
  .venue-card:hover{background:var(--card);border-color:var(--border);}
  .venue-card.active{background:var(--card);border-color:var(--accent);}
  .v-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .v-info{flex:1;min-width:0;}
  .v-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .v-addr{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .v-link{color:var(--accent);font-size:15px;flex-shrink:0;opacity:.6;transition:opacity .2s;}
  .venue-card:hover .v-link{opacity:1;}

  #map{width:100%;height:100%;z-index:1;}

  /* ─── POPUP ─── */
  .leaflet-popup-content-wrapper{
    background:#1a1d2e!important;border:1px solid #2a2f42!important;
    border-radius:16px!important;box-shadow:0 28px 80px rgba(0,0,0,.75)!important;
    color:#e8e4dc!important;font-family:'DM Sans',sans-serif!important;
    padding:0!important;overflow:hidden!important;
  }
  .leaflet-popup-content{margin:0!important;width:290px!important;}
  .leaflet-popup-tip-container{display:none;}
  .leaflet-popup-close-button{color:#7a8099!important;top:8px!important;right:10px!important;z-index:10;font-size:20px!important;background:rgba(13,15,20,.6)!important;border-radius:50%!important;width:24px!important;height:24px!important;display:flex!important;align-items:center!important;justify-content:center!important;}

  .popup-img-wrap{width:100%;height:155px;overflow:hidden;position:relative;background:#0d0f14;flex-shrink:0;}
  .popup-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
  .popup-img-wrap:hover img{transform:scale(1.05);}
  .popup-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:44px;
    background:linear-gradient(135deg,#161a26,#252a3a);}
  .popup-img-badge{position:absolute;bottom:8px;left:10px;background:rgba(13,15,20,.8);backdrop-filter:blur(6px);
    border-radius:50px;padding:3px 10px;font-size:11px;color:#e8c87a;font-weight:500;}
  .popup-loading{width:100%;height:155px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#161a26,#252a3a);font-size:13px;color:#7a8099;}
  .popup-spin{display:inline-block;width:18px;height:18px;border:2px solid #2a2f42;border-top-color:#c9a84c;
    border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  .popup-body{padding:13px 16px 15px;}
  .popup-name{font-size:15px;font-weight:600;line-height:1.3;margin-bottom:5px;}
  .popup-addr{display:flex;align-items:flex-start;gap:5px;font-size:12px;color:#7a8099;margin-bottom:3px;line-height:1.4;}
  .popup-addr svg{flex-shrink:0;margin-top:1px;}
  .popup-cat-tag{display:inline-block;font-size:11px;color:#7a8099;margin-bottom:12px;}
  .popup-btn{display:block;text-align:center;background:linear-gradient(135deg,#c9a84c,#e8c87a);color:#0d0f14;
    font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:9px 16px;border-radius:50px;
    text-decoration:none;transition:opacity .2s;}
  .popup-btn:hover{opacity:.85;}

  .no-results{text-align:center;padding:32px 14px;color:var(--muted);font-size:13px;}
  .custom-marker{width:30px;height:30px;border-radius:50%;border:2.5px solid rgba(255,255,255,.2);
    display:flex;align-items:center;justify-content:center;font-size:13px;
    box-shadow:0 4px 14px rgba(0,0,0,.5);cursor:pointer;}
</style>

// ─── Wikipedia image cache ───
const imgCache={};
async function getWikiImg(title){
  if(imgCache[title]!==undefined)return imgCache[title];
  for(const lang of['fr','en']){
    try{
      const r=await fetch(`https://${lang}.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&format=json&pithumbsize=500&origin=*`);
      const d=await r.json();
      const p=Object.values(d.query.pages)[0];
      if(p&&p.thumbnail){imgCache[title]=p.thumbnail.source;return p.thumbnail.source;}
    }catch(e){}
  }
  imgCache[title]=null;return null;
}

function popupHTML(v,img,loading=false){
  const imgSection=loading
    ?`<div class="popup-loading"><span class="popup-spin"></span>Chargement…</div>`
    :img
      ?`<div class="popup-img-wrap"><img src="${img}" alt="${v.name}" loading="lazy"/><div class="popup-img-badge">${CL[v.cat]}</div></div>`
      :`<div class="popup-img-wrap"><div class="popup-placeholder">${CE[v.cat]}</div><div class="popup-img-badge">${CL[v.cat]}</div></div>`;
  return`${imgSection}<div class="popup-body">
    <div class="popup-name">${v.name}</div>
    <div class="popup-addr"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${v.address}</div>
    <a class="popup-btn" href="${v.url}" target="_blank" rel="noopener" style="margin-top:13px">Voir le guide réceptif ↗</a>
  </div>`;
}

// ─── MAP ───
const map=L.map('map',{center:[48.85,2.34],zoom:9,zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'©OpenStreetMap ©CARTO',maxZoom:19}).addTo(map);

const markers={};
const layer=L.layerGroup().addTo(map);

VENUES.forEach((v,i)=>{
  const color=CC[v.cat]||'#888';
  const icon=L.divIcon({className:'',html:`<div class="custom-marker" style="background:${color}22;border-color:${color}">${CE[v.cat]}</div>`,iconSize:[30,30],iconAnchor:[15,15],popupAnchor:[0,-18]});
  const m=L.marker([v.lat,v.lng],{icon}).addTo(layer);
  m.on('click',async()=>{
    const cached=imgCache[v.wiki];
    if(cached!==undefined){
      m.bindPopup(popupHTML(v,cached),{maxWidth:320}).openPopup();
    } else {
      m.bindPopup(popupHTML(v,null,true),{maxWidth:320}).openPopup();
      const img=await getWikiImg(v.wiki);
      if(m.isPopupOpen())m.setPopupContent(popupHTML(v,img));
    }
  });
  markers[i]=m;
});

// preload first 25
setTimeout(()=>{VENUES.slice(0,25).forEach(v=>getWikiImg(v.wiki));},500);

// ─── SIDEBAR ───
let activeFilter='all';

function buildSidebar(filter='all',query=''){
  const sb=document.getElementById('sidebar');
  sb.innerHTML='';
  const chips=document.createElement('div');chips.className='filter-chips';
  [['all','✦ Tous'],['comet','☄️ Comet'],['chateau',"🏰 Château'F"],['stade','🏟️ Stades'],
   ['paris','Paris 75'],['idf','Île-de-Fr.'],['normandie','Normandie'],['belgique','🇧🇪']
  ].forEach(([k,lbl])=>{
    const cnt=k==='all'?VENUES.length:VENUES.filter(v=>v.cat===k).length;
    const c=document.createElement('div');
    c.className='chip'+(k===activeFilter?' active':'');c.dataset.cat=k;
    c.innerHTML=`${lbl}<span class="count-badge">${cnt}</span>`;
    c.addEventListener('click',()=>{activeFilter=k;buildSidebar(k,document.getElementById('searchInput').value);});
    chips.appendChild(c);
  });
  sb.appendChild(chips);

  const q=query.toLowerCase().trim();
  const filtered=VENUES.filter(v=>{
    const mc=filter==='all'||v.cat===filter;
    const mq=!q||v.name.toLowerCase().includes(q)||v.address.toLowerCase().includes(q);
    return mc&&mq;
  });

  VENUES.forEach((v,i)=>{
    if(filtered.includes(v))layer.addLayer(markers[i]);
    else layer.removeLayer(markers[i]);
  });

  if(!filtered.length){sb.innerHTML+='<div class="no-results">Aucun résultat trouvé</div>';return;}

  const groups={};
  filtered.forEach(v=>{if(!groups[v.cat])groups[v.cat]=[];groups[v.cat].push(v);});

  Object.entries(groups).forEach(([cat,venues])=>{
    const lbl=document.createElement('div');lbl.className='group-label';lbl.textContent=CL[cat];sb.appendChild(lbl);
    venues.forEach(v=>{
      const idx=VENUES.indexOf(v);
      const card=document.createElement('div');card.className='venue-card';
      card.innerHTML=`<div class="v-dot" style="background:${CC[v.cat]}"></div>
        <div class="v-info"><div class="v-name">${v.name}</div><div class="v-addr">${v.address}</div></div>
        <span class="v-link">↗</span>`;
      card.addEventListener('click',async()=>{
        map.setView([v.lat,v.lng],14,{animate:true});
        document.querySelectorAll('.venue-card').forEach(c=>c.classList.remove('active'));
        card.classList.add('active');
        setTimeout(async()=>{
          markers[idx].unbindPopup();
          const cached=imgCache[v.wiki];
          if(cached!==undefined){
            markers[idx].bindPopup(popupHTML(v,cached),{maxWidth:320}).openPopup();
          } else {
            markers[idx].bindPopup(popupHTML(v,null,true),{maxWidth:320}).openPopup();
            const img=await getWikiImg(v.wiki);
            if(markers[idx].isPopupOpen())markers[idx].setPopupContent(popupHTML(v,img));
          }
        },350);
      });
      card.querySelector('.v-link').addEventListener('click',e=>{e.stopPropagation();window.open(v.url,'_blank');});
      sb.appendChild(card);
    });
  });
}

buildSidebar();

// ─── SEARCH ───
const inp=document.getElementById('searchInput');
const sr=document.getElementById('searchResults');

inp.addEventListener('input',()=>{
  const q=inp.value.trim().toLowerCase();
  buildSidebar(activeFilter,q);
  if(!q){sr.classList.remove('show');return;}
  const matches=VENUES.filter(v=>v.name.toLowerCase().includes(q)||v.address.toLowerCase().includes(q)).slice(0,8);
  if(!matches.length){sr.classList.remove('show');return;}
  sr.innerHTML=matches.map(v=>{
    const idx=VENUES.indexOf(v);
    return`<div class="sr-item" data-idx="${idx}">
      <div class="sr-dot" style="background:${CC[v.cat]}"></div>
      <div class="sr-info"><div class="sr-name">${v.name}</div><div class="sr-meta">${v.address}</div></div>
      <span class="sr-arrow">→</span></div>`;
  }).join('');
  sr.classList.add('show');
  sr.querySelectorAll('.sr-item').forEach(el=>{
    el.addEventListener('click',async()=>{
      const v=VENUES[+el.dataset.idx];const idx=+el.dataset.idx;
      map.setView([v.lat,v.lng],15,{animate:true});
      sr.classList.remove('show');inp.value=v.name;
      buildSidebar(activeFilter,'');
      setTimeout(async()=>{
        markers[idx].unbindPopup();
        const cached=imgCache[v.wiki];
        if(cached!==undefined){
          markers[idx].bindPopup(popupHTML(v,cached),{maxWidth:320}).openPopup();
        } else {
          markers[idx].bindPopup(popupHTML(v,null,true),{maxWidth:320}).openPopup();
          const img=await getWikiImg(v.wiki);
          if(markers[idx].isPopupOpen())markers[idx].setPopupContent(popupHTML(v,img));
        }
      },450);
    });
  });
});

document.addEventListener('click',e=>{if(!inp.contains(e.target)&&!sr.contains(e.target))sr.classList.remove('show');});
inp.addEventListener('keydown',e=>{if(e.key==='Escape')sr.classList.remove('show');});
</script>
