<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#0d0f14;--surface:#161920;--card:#1e2230;--border:#2a2f42;
  --accent:#c9a84c;--accent2:#e8c87a;--text:#e8e4dc;--muted:#7a8099;--tag-bg:#252a3a;
  --comet:#5b8fff;--chateau:#8b5cf6;--stade:#ef4444;--paris:#10b981;
  --idf:#f59e0b;--normandie:#06b6d4;--nord:#ff6b6b;--somme:#a78bfa;
  --belgique:#ec4899;--oise:#34d399;--touquet:#f97316;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* ── HEADER ── */
header{
  background:linear-gradient(135deg,#0d0f14 0%,#161a26 100%);
  border-bottom:1px solid var(--border);
  padding:0 22px;display:flex;align-items:center;gap:18px;height:58px;
  position:relative;z-index:200;
}
.logo{font-family:'Playfair Display',serif;font-size:18px;color:var(--accent);white-space:nowrap;letter-spacing:.3px;}
.logo span{color:var(--text);font-weight:300;}

.search-wrap{flex:1;max-width:540px;position:relative;}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
#searchInput{
  width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:50px;
  padding:9px 18px 9px 38px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,168,76,.1);}
#searchInput::placeholder{color:var(--muted);}

#searchResults{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  box-shadow:0 16px 50px rgba(0,0,0,.55);max-height:320px;overflow-y:auto;
  display:none;z-index:9999;
}
#searchResults.show{display:block;}
.sr-item{display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border);}
.sr-item:last-child{border-bottom:none;}
.sr-item:hover{background:var(--tag-bg);}
.sr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sr-info{flex:1;min-width:0;}
.sr-name{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sr-meta{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sr-arr{color:var(--accent);font-size:13px;flex-shrink:0;}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:295px 1fr;height:calc(100vh - 58px);}

/* ── SIDEBAR ── */
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:11px 9px;z-index:2;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.filter-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:11px;}
.chip{
  padding:3px 9px;border-radius:50px;font-size:10.5px;font-weight:500;cursor:pointer;
  border:1.5px solid transparent;transition:all .18s;background:var(--tag-bg);color:var(--muted);
  white-space:nowrap;
}
.chip:hover{color:var(--text);border-color:currentColor;}
.chip.active{color:var(--text);border-color:currentColor;}
.chip[data-cat="all"].active{color:var(--accent);border-color:var(--accent);}
.chip[data-cat="comet"].active{color:var(--comet);}
.chip[data-cat="chateau"].active{color:var(--chateau);}
.chip[data-cat="stade"].active{color:var(--stade);}
.chip[data-cat="paris"].active{color:var(--paris);}
.chip[data-cat="idf"].active{color:var(--idf);}
.chip[data-cat="normandie"].active{color:var(--normandie);}
.chip[data-cat="nord"].active{color:var(--nord);}
.chip[data-cat="somme"].active{color:var(--somme);}
.chip[data-cat="belgique"].active{color:var(--belgique);}
.chip[data-cat="oise"].active{color:var(--oise);}
.chip[data-cat="touquet"].active{color:var(--touquet);}
.count-b{display:inline-block;background:var(--border);border-radius:50px;font-size:9.5px;padding:0px 4px;margin-left:2px;color:var(--muted);}

.group-label{
  font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);
  padding:9px 3px 4px;display:flex;align-items:center;gap:6px;
}
.group-label::after{content:'';flex:1;height:1px;background:var(--border);}

.venue-card{
  display:flex;align-items:center;gap:7px;padding:6px 7px;border-radius:8px;
  cursor:pointer;transition:all .13s;border:1px solid transparent;margin-bottom:1px;
}
.venue-card:hover{background:var(--card);border-color:var(--border);}
.venue-card.active{background:var(--card);border-color:var(--accent);}
.v-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.v-info{flex:1;min-width:0;}
.v-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.v-addr{font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.v-ext{color:var(--accent);font-size:13px;flex-shrink:0;opacity:.55;transition:opacity .15s;}
.venue-card:hover .v-ext{opacity:1;}
.no-results{text-align:center;padding:28px 12px;color:var(--muted);font-size:12px;}

/* ── MAP ── */
#map{width:100%;height:100%;z-index:1;}
.custom-marker{
  width:28px;height:28px;border-radius:50%;border:2.5px solid rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;font-size:12px;
  box-shadow:0 3px 12px rgba(0,0,0,.5);cursor:pointer;transition:transform .15s;
}
.custom-marker:hover{transform:scale(1.25);}

/* ── HOVER CARD ── */
#hcard{
  position:fixed;
  width:300px;
  background:#12151f;
  border:1px solid var(--border);
  border-radius:14px;
  box-shadow:0 20px 70px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.03);
  z-index:5000;
  pointer-events:none;
  opacity:0;
  transform:translateY(6px) scale(.97);
  transition:opacity .18s ease, transform .18s ease;
  overflow:hidden;
}
#hcard.show{
  opacity:1;
  transform:translateY(0) scale(1);
  pointer-events:auto;
}

/* color bar top */
.hc-bar{height:4px;width:100%;}

/* header */
.hc-head{padding:13px 15px 10px;}
.hc-cat{font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;opacity:.85;}
.hc-name{font-size:15px;font-weight:700;line-height:1.2;margin-bottom:10px;}

/* info rows */
.hc-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:7px;}
.hc-icon{
  width:28px;height:28px;border-radius:8px;background:var(--tag-bg);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.hc-icon svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2;}
.hc-row-text{flex:1;min-width:0;}
.hc-row-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px;}
.hc-row-val{font-size:12.5px;color:var(--text);line-height:1.4;}
.hc-phone-link{color:var(--accent);text-decoration:none;font-size:12.5px;}
.hc-phone-link:hover{text-decoration:underline;}

/* divider */
.hc-div{height:1px;background:var(--border);margin:10px 0;}

/* guide button */
.hc-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin:0 15px 14px;
  background:linear-gradient(135deg,#c9a84c,#e8c87a);
  color:#0d0f14;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:700;
  padding:10px 16px;border-radius:9px;text-decoration:none;
  transition:opacity .2s,transform .15s;
}
.hc-btn:hover{opacity:.9;transform:translateY(-1px);}
.hc-btn svg{width:13px;height:13px;stroke:#0d0f14;fill:none;stroke-width:2.5;}

/* gmaps link */
.hc-gmaps{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin:0 15px 13px;
  padding:8px;border-radius:8px;
  background:var(--tag-bg);border:1px solid var(--border);
  text-decoration:none;color:var(--muted);font-size:11.5px;
  transition:border-color .15s,color .15s;
}
.hc-gmaps:hover{border-color:var(--accent);color:var(--text);}
.hc-gmaps img{width:14px;height:14px;border-radius:2px;}

/* pin hint */
.hc-hint{text-align:center;font-size:10px;color:var(--muted);padding-bottom:10px;opacity:.6;}
</style>
</head>

// ── CARD DOM refs ──
const hcard=document.getElementById('hcard');
const hcBar=document.getElementById('hcBar');
const hcCat=document.getElementById('hcCat');
const hcName=document.getElementById('hcName');
const hcAddr=document.getElementById('hcAddr');
const hcPhoneRow=document.getElementById('hcPhoneRow');
const hcPhone=document.getElementById('hcPhone');
const hcBtn=document.getElementById('hcBtn');
const hcGmaps=document.getElementById('hcGmaps');
let hideTimer=null, pinned=false;

function posCard(x,y){
  const W=window.innerWidth,H=window.innerHeight,CW=300,CH=hcard.offsetHeight||310;
  let l=x+18,t=y-80;
  if(l+CW>W-8) l=x-CW-18;
  if(t+CH>H-8) t=H-CH-8;
  if(t<8) t=8;
  hcard.style.left=l+'px';
  hcard.style.top=t+'px';
}

function showCard(v,x,y){
  clearTimeout(hideTimer);
  const color=CC[v.c];
  hcBar.style.background=`linear-gradient(90deg,${color},${color}88)`;
  hcCat.textContent=CL[v.c];
  hcCat.style.color=color;
  hcName.textContent=v.n;
  hcAddr.textContent=v.a;
  if(v.p){
    hcPhone.innerHTML=`<a class="hc-phone-link" href="tel:${v.p.replace(/\s/g,'')}">${v.p}</a>`;
    hcPhoneRow.style.display='flex';
  } else {
    hcPhoneRow.style.display='none';
  }
  hcBtn.href=v.url;
  hcGmaps.href=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(v.n+', '+v.a)}`;
  hcard.classList.add('show');
  posCard(x,y);
}

function startHide(){
  if(pinned) return;
  hideTimer=setTimeout(()=>hcard.classList.remove('show'),250);
}

hcard.addEventListener('mouseenter',()=>clearTimeout(hideTimer));
hcard.addEventListener('mouseleave',()=>{ if(!pinned) startHide(); });
document.addEventListener('click',e=>{
  if(!hcard.contains(e.target)){ pinned=false; hcard.classList.remove('show'); }
});

// ── MAP ──
const map=L.map('map',{center:[49.8,2.8],zoom:7,zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'©OpenStreetMap ©CARTO',maxZoom:19
}).addTo(map);

const markers={},layer=L.layerGroup().addTo(map);

V.forEach((v,i)=>{
  const col=CC[v.c];
  const icon=L.divIcon({
    className:'',
    html:`<div class="custom-marker" style="background:${col}22;border-color:${col}">${CE[v.c]}</div>`,
    iconSize:[28,28],iconAnchor:[14,14]
  });
  const m=L.marker([v.lat,v.lng],{icon}).addTo(layer);
  m.on('mouseover',e=>{
    if(pinned) return;
    const r=document.getElementById('map').getBoundingClientRect();
    showCard(v,r.left+e.containerPoint.x,r.top+e.containerPoint.y);
  });
  m.on('mouseout',()=>{ if(!pinned) startHide(); });
  m.on('click',e=>{
    pinned=true;
    const r=document.getElementById('map').getBoundingClientRect();
    showCard(v,r.left+e.containerPoint.x,r.top+e.containerPoint.y);
    map.setView([v.lat,v.lng],14,{animate:true});
    document.querySelectorAll('.venue-card').forEach(c=>c.classList.remove('active'));
  });
  markers[i]=m;
});

// ── SIDEBAR ──
let activeCat='all';
function buildSidebar(cat='all',q=''){
  const sb=document.getElementById('sidebar');
  sb.innerHTML='';

  // chips
  const wrap=document.createElement('div');wrap.className='filter-chips';
  [
    ['all','✦ Tous'],['comet','☄️ Comet'],['chateau',"🏰 Château'F"],
    ['stade','🏟️ Stades'],['paris','🗼 Paris'],['idf','📍 IDF'],
    ['normandie','🌊 Normandie'],['nord','🏭 Nord'],['somme','🌾 Somme'],
    ['oise','🌿 Oise'],['belgique','🇧🇪'],['touquet','⛱️ Touquet'],
  ].forEach(([k,lbl])=>{
    const cnt=k==='all'?V.length:V.filter(v=>v.c===k).length;
    const el=document.createElement('div');
    el.className='chip'+(k===activeCat?' active':'');el.dataset.cat=k;
    el.innerHTML=`${lbl}<span class="count-b">${cnt}</span>`;
    el.onclick=()=>{ activeCat=k; buildSidebar(k,document.getElementById('searchInput').value); };
    wrap.appendChild(el);
  });
  sb.appendChild(wrap);

  const qL=q.toLowerCase().trim();
  const filtered=V.filter(v=>{
    const mc=cat==='all'||v.c===cat;
    const mq=!qL||v.n.toLowerCase().includes(qL)||v.a.toLowerCase().includes(qL);
    return mc&&mq;
  });

  V.forEach((v,i)=>{ filtered.includes(v)?layer.addLayer(markers[i]):layer.removeLayer(markers[i]); });

  if(!filtered.length){
    const el=document.createElement('div');el.className='no-results';el.textContent='Aucun résultat';sb.appendChild(el);return;
  }

  const groups={};
  filtered.forEach(v=>{ if(!groups[v.c])groups[v.c]=[]; groups[v.c].push(v); });

  Object.entries(groups).forEach(([cat,venues])=>{
    const lbl=document.createElement('div');lbl.className='group-label';lbl.textContent=CL[cat];sb.appendChild(lbl);
    venues.forEach(v=>{
      const idx=V.indexOf(v);
      const card=document.createElement('div');card.className='venue-card';
      card.innerHTML=`
        <div class="v-dot" style="background:${CC[v.c]}"></div>
        <div class="v-info">
          <div class="v-name">${v.n}</div>
          <div class="v-addr">${v.a}</div>
        </div>
        <span class="v-ext">↗</span>`;

      card.addEventListener('mouseenter',()=>{
        if(pinned) return;
        const r=card.getBoundingClientRect();
        showCard(v,r.right+10,r.top+r.height/2);
      });
      card.addEventListener('mouseleave',()=>{ if(!pinned) startHide(); });
      card.addEventListener('click',()=>{
        pinned=true;
        map.setView([v.lat,v.lng],14,{animate:true});
        document.querySelectorAll('.venue-card').forEach(c=>c.classList.remove('active'));
        card.classList.add('active');
        const r=card.getBoundingClientRect();
        showCard(v,r.right+10,r.top+r.height/2);
      });
      card.querySelector('.v-ext').addEventListener('click',e=>{
        e.stopPropagation();window.open(v.url,'_blank');
      });
      sb.appendChild(card);
    });
  });
}
buildSidebar();

// ── SEARCH ──
const inp=document.getElementById('searchInput');
const sr=document.getElementById('searchResults');
inp.addEventListener('input',()=>{
  const q=inp.value.trim().toLowerCase();
  buildSidebar(activeCat,q);
  if(!q){sr.classList.remove('show');return;}
  const hits=V.filter(v=>v.n.toLowerCase().includes(q)||v.a.toLowerCase().includes(q)).slice(0,8);
  if(!hits.length){sr.classList.remove('show');return;}
  sr.innerHTML=hits.map(v=>`
    <div class="sr-item" data-i="${V.indexOf(v)}">
      <div class="sr-dot" style="background:${CC[v.c]}"></div>
      <div class="sr-info">
        <div class="sr-name">${v.n}</div>
        <div class="sr-meta">${v.a}</div>
      </div>
      <span class="sr-arr">→</span>
    </div>`).join('');
  sr.classList.add('show');
  sr.querySelectorAll('.sr-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const v=V[+el.dataset.i];
      map.setView([v.lat,v.lng],15,{animate:true});
      sr.classList.remove('show');inp.value=v.n;
      buildSidebar(activeCat,'');
      pinned=true;
      setTimeout(()=>{
        const r=document.getElementById('map').getBoundingClientRect();
        showCard(v,r.left+r.width/2,r.top+180);
      },400);
    });
  });
});
document.addEventListener('click',e=>{
  if(!inp.contains(e.target)&&!sr.contains(e.target)) sr.classList.remove('show');
});
</script>
</body>
